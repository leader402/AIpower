name: 议题/提案 · Proposal
description: 提交一项议题、行动建议或风险报告。 / Propose a topic, action, or risk report.
title: "[proposal] "
labels: ["proposal"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 类型 · Type
      options:
        - Action / 行动建议
        - Policy stance / 政策立场
        - Risk report / 风险报告
        - Charter amendment / 章程修订
        - Other / 其他
    validations:
      required: true

  - type: dropdown
    id: pillar
    attributes:
      label: 相关支柱 · Pillar
      multiple: true
      options:
        - Advocacy / 倡导
        - Openness / 开放
        - Education / 教育
        - Access / 接入
        - Watch / 监督
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 一句话摘要 · One-sentence summary
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景 · Background
      description: 发生了什么？为什么现在做这件事？/ What happened? Why now?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 具体提议 · Concrete proposal
      description: 你希望 AIpower 做什么？请写成可执行步骤。/ What do you want AIpower to do? Concrete, actionable steps.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 证据/来源 · Evidence / sources
      description: 链接、截图、数据。 / Links, screenshots, data.
    validations:
      required: false

  - type: textarea
    id: conflict
    attributes:
      label: 利益声明 · Conflict of interest disclosure
      description: 你是否与本提议存在利益关联？/ Any personal stake in this proposal?
    validations:
      required: false

  - type: checkboxes
    id: agree
    attributes:
      label: 确认 · Confirmation
      options:
        - label: 我已阅读《章程》和《行为准则》。 / I have read the Charter and Code of Conduct.
          required: true
